name: Job Alert Bot

on:
  schedule:
    # Runs every hour between 7am–11pm IST (6am–10pm UTC)
    # Adjust cron times to your preference
    - cron: "0 6-22 * * *"   # top of every hour, UTC 6–22

  workflow_dispatch:          # lets you trigger manually from GitHub UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit seen_jobs.json back

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Run bot ─────────────────────────────────────────────────────────────
      - name: Run job alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # ── Persist seen_jobs.json so dedup works across runs ───────────────────
      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
